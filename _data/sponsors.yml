# EMO 2027 Sponsors

# Confirmed sponsors
#
# `logo` is normally a filename inside /assets/images/sponsors/.
# If the value starts with "/", the template treats it as an absolute
# site-relative path (so existing assets elsewhere can be reused).
confirmed:
  - name: "Springer"
    logo: "springer-logo.svg"
    url: "https://www.springer.com"
    tier: "publisher"

  - name: "Lecture Notes in Computer Science"
    logo: "lncs-logo.png"
    url: "https://link.springer.com/conference/emo"
    tier: "publisher"

  - name: "University of Exeter"
    logo: "/assets/images/exeter-logo.svg"
    url: "https://www.exeter.ac.uk"
    tier: "host"

# Sponsor tiers
tiers:
  platinum:
    name: "Platinum Sponsors"
    sponsors: []

  gold:
    name: "Gold Sponsors"
    sponsors: []

  silver:
    name: "Silver Sponsors"
    sponsors: []

  bronze:
    name: "Bronze Sponsors"
    sponsors: []

  publisher:
    name: "Publishing Partner"
    sponsors:
      - "Springer"
      - "Lecture Notes in Computer Science"

  host:
    name: "Host Institution"
    sponsors:
      - "University of Exeter"

# Call for sponsors
call_for_sponsors:
  active: true
  # contact_email now sourced from _data/conference.yml → contact.email
  message: "Interested in sponsoring EMO 2027? Contact us for sponsorship opportunities."
