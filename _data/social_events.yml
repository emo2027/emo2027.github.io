events:
    - id: "welcome-reception"
      title: "Welcome Reception"
      schedule_id: "welcome-reception"
      location:
          label: "Location"
          name: "XFi Break-out Area"
          url: "https://event.exeter.ac.uk/venues/buildingone-and-xfi"
          suffix: "University of Exeter"
